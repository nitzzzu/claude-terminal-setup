# ~/.tmux.conf  (WSL / Linux)

# truecolor + undercurl passthrough so Neovim renders correctly inside tmux
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -ga terminal-features ",*:usstyle"

# quality of life
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g history-limit 10000
set -sg escape-time 10   # snappier Esc in Neovim
