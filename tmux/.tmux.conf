# ~/.tmux.conf  (WSL / Linux)

# truecolor + undercurl passthrough so Neovim renders correctly inside tmux
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -ga terminal-features ",*:usstyle"

# quality of life
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g history-limit 10000
set -sg escape-time 10   # snappier Esc in Neovim

# behavior
set -g renumber-windows on
set -g extended-keys on
set -g extended-keys-format csi-u

# layout
set -g status-position top
set -g pane-border-lines heavy
setw -gu window-style          # clear tmux's default inactive-pane dimming
setw -gu window-active-style

# pane navigation (vim-style, repeatable with -r)
bind-key -r h select-pane -L
bind-key -r j select-pane -D
bind-key -r k select-pane -U
bind-key -r l select-pane -R

# splits / new windows inherit the current pane's cwd
bind-key '"' split-window -c "#{pane_current_path}"
bind-key %   split-window -h -c "#{pane_current_path}"
bind-key c   new-window   -c "#{pane_current_path}"
bind-key &   kill-window

# vi copy mode -> Windows clipboard via clip.exe (WSL)
bind-key y copy-mode
bind-key -T copy-mode-vi v     send-keys -X begin-selection
bind-key -T copy-mode-vi y     send-keys -X copy-pipe-and-cancel "clip.exe"
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "clip.exe"
bind-key -T copy-mode-vi Escape send-keys -X cancel

# ---------------------------------------------------------------------------
# plugins (rose-pine theme + session save/restore), managed by TPM
# ---------------------------------------------------------------------------
set-environment -g TMUX_PLUGIN_MANAGER_PATH "$HOME/.tmux/plugins"

# bootstrap TPM on first launch so the config is self-contained
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

# rose-pine (moon)
set -g @rose_pine_variant 'moon'
set -g @rose_pine_date_time ''
set -g @rose_pine_directory 'on'
set -g @rose_pine_show_current_program 'on'
set -g @rose_pine_disable_active_window_menu 'on'
set -g @rose_pine_bar_bg_disable 'on'
set -g @rose_pine_bar_bg_disabled_color_option 'default'

set -g @plugin 'rose-pine/tmux'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

run-shell "$HOME/.tmux/plugins/tpm/tpm"

# status-line overrides (applied AFTER rose-pine loads) — moon palette
set -g status-left ""
setw -g window-status-format         "#[fg=#908caa,bg=default] #I #W "
setw -g window-status-current-format "#[fg=#232136,bg=#c4a7e7] #I #W "
setw -g window-status-separator " "
